name: realitychecker
description: "AI Study Companion - Generate flashcards & quizzes from PDFs using Claude AI"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File picking & PDF extraction
  file_picker: ^8.0.0+1
  syncfusion_flutter_pdf: ^27.1.48

  # Networking
  http: ^1.2.0

  # Animations
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.70.2

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.4

  # Utils
  intl: ^0.19.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
